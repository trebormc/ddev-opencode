name: ddev-opencode

ddev_version_constraint: '>= v1.23.5'

dependencies:
  - trebormc/ddev-playwright-mcp
  - trebormc/ddev-beads
  - trebormc/ddev-agents-sync

pre_install_actions:
  - |
    #ddev-description:Checking prerequisites for OpenCode
    echo "Installing ddev-opencode add-on..."
  - |
    #ddev-description:Creating shared OpenCode config directory
    OC_DIR="${HOME}/.ddev/opencode"
    mkdir -p "$OC_DIR/auth" "$OC_DIR/config"

project_files:
  - docker-compose.opencode.yaml
  - opencode-build/Dockerfile.opencode
  - opencode-build/entrypoint.sh
  - opencode-build/sync-credentials.sh
  - commands/host/opencode

global_files: []

post_install_actions:
  - |
    #ddev-description:Configuring OpenCode environment
    if [ ! -f .env.opencode ]; then
      cat > .env.opencode << 'ENVEOF'
    #ddev-generated
    # OpenCode environment configuration

    # Shared OpenCode directory for credentials and config.
    # This directory is shared across ALL DDEV projects so you only
    # need to configure once. Change only if you need a custom location.
    # Subdirectories: auth/ (credentials), config/ (opencode.json, custom overrides)
    HOST_OPENCODE_DIR=${HOME}/.ddev/opencode

    # Claude Code config directory (for automatic OAuth credential sync)
    # If ddev-claude-code is installed, credentials are synced automatically
    HOST_CLAUDE_CONFIG_DIR=${HOME}/.ddev/claude-code

    # Timezone
    TZ=UTC
    ENVEOF
      echo "Created .env.opencode — review settings in .ddev/.env.opencode"
    else
      echo ".env.opencode already exists, skipping"
    fi
    # Create default opencode-notifier.json if missing
    OC_CONFIG="${HOST_OPENCODE_DIR:-${HOME}/.ddev/opencode}/config"
    NOTIFIER_FILE="$OC_CONFIG/opencode-notifier.json"
    if [ ! -f "$NOTIFIER_FILE" ] || [ -L "$NOTIFIER_FILE" ]; then
      rm -f "$NOTIFIER_FILE"
      cat > "$NOTIFIER_FILE" << 'NOTIFIEREOF'
    {
      "sound": false,
      "notification": false,
      "timeout": 10,
      "showProjectName": true,
      "command": {
        "enabled": true,
        "path": "/bin/sh",
        "args": [
          "-c",
          "curl -s --connect-timeout 1 -X POST http://host.docker.internal:5454/notify -H 'Content-Type: application/json' -d \"{\\\"title\\\":\\\"[$DDEV_SITENAME] ${DDEV_TUI_TITLE:-OpenCode}\\\",\\\"message\\\":\\\"{message}\\\"}\""
        ],
        "minDuration": 5
      },
      "events": {
        "permission": true,
        "complete": true,
        "subagent_complete": false,
        "error": true,
        "question": true
      },
      "messages": {
        "permission": "Needs your permission",
        "complete": "Task completed",
        "error": "Error detected",
        "question": "Waiting for your response"
      }
    }
    NOTIFIEREOF
      echo "Created opencode-notifier.json in $OC_CONFIG"
    fi
    echo "OpenCode add-on installed successfully!"

removal_actions:
  - |
    #ddev-description:Cleaning up OpenCode
    echo "OpenCode add-on removed."
